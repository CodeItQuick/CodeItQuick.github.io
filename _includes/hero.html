<section class="w-full py-8 lg:py-32">
    <div class="flex flex-col md:flex-row items-start gap-8 max-w-6xl mx-auto px-4">
        <img src="/assets/images/{{ include.image }}" class="rounded-lg shadow-2xl md:w-5/12" />
        <div class="flex flex-col justify-center">
            <h1 class="text-5xl font-bold font-[display]">{{ include.title }}</h1>
            <h2 class="text-3xl py-8 font-[body]">{{ include.description }}</h2>
        </div>
    </div>
</section>
